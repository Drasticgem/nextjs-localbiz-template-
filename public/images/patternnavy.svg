<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <title>Scott Electric Group – Brand Pattern</title>
  <desc>Geometric bolt repeat pattern for use as background texture on branded materials — navy version</desc>

  <defs>
    <pattern id="boltPattern" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
      <!-- Bolt mark at small scale, repeated -->
      <polygon points="40,6 48,18 45,18 53,30 44,30 47,42 33,28 38,28 34,17 42,17" fill="#D4A83A" opacity="0.12"/>
    </pattern>
  </defs>

  <!-- Navy background -->
  <rect width="800" height="600" fill="#0F2040"/>

  <!-- Pattern overlay -->
  <rect width="800" height="600" fill="url(#boltPattern)"/>

  <!-- Usage label overlay -->
  <rect x="0" y="520" width="800" height="80" fill="rgba(15,32,64,0.85)"/>
  <text x="32" y="552" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#D4A83A" letter-spacing="3">USAGE</text>
  <text x="32" y="570" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.7)">Background texture for proposals, presentations, signage, and event materials. Navy with gold bolt repeat at 12% opacity.</text>
  <text x="32" y="588" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.4)">Do not place on this pattern without a legibility-checked overlay. Minimum overlay opacity: 60% navy.</text>
</svg>
